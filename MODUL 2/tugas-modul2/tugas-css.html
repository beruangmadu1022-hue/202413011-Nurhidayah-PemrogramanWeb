<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Praktikum CSS</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #add8e6;
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }

        h1{
            color: white;
            font-size: 40px;
            margin-bottom: 20px;
        }

        p{
            background-color: #d3d3d3;
            color: black;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        .container{
            max-width: 800px;
            margin: auto;

            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .box1,
        .box2,
        .box3{
            border: 2px solid black;
            padding: 10px;
            height: 150px;
            border-radius: 12px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-weight: bold;
        }

        .box1{
            background-color: #ff9999;
        }

        .box2{
            background-color: #99ff99;
        }

        .box3{
            background-color: #9999ff;
        }

        @media screen and (max-width: 768px){

            .container{
                grid-template-columns: repeat(2, 1fr);
            }

        }

        @media screen and (max-width: 480px){

            h1{
                font-size: 28px;
            }

            p{
                padding: 10px;
            }

            .container{
                grid-template-columns: 1fr;
            }

            .box1,
            .box2,
            .box3{
                height: 120px;
            }

        }

    </style>
</head>
<body>

    <h1>Praktikum CSS</h1>

    <p>
        Ini adalah tugas praktikum CSS yang menerapkan warna, font,
        box model, CSS Grid, dan Responsive Design menggunakan
        Media Query sehingga tampilan dapat menyesuaikan ukuran layar.
    </p>

    <div class="container">

        <div class="box1">
            Box 1
        </div>

        <div class="box2">
            Box 2
        </div>

        <div class="box3">
            Box 3
        </div>

    </div>

</body>
</html>
