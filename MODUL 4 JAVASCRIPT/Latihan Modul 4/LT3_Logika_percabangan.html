<!DOCTYPE html>
<html>
<head>

    <title>Latihan Logika Percabangan</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input{
            padding:8px;
            width:220px;
        }

        button{
            padding:8px 15px;
            margin-left:5px;
            cursor:pointer;
        }

        #hasil{
            margin-top:20px;
            color:blue;
        }

    </style>

</head>

<body>

<h2>Kalkulator Diskon Belanja</h2>

<p>Masukkan Total Belanja Anda</p>

<input
type="number"
id="totalBelanja"
placeholder="Contoh : 150000">

<button onclick="cekDiskon()">Cek Diskon</button>

<h3 id="hasil"></h3>

<script>

function cekDiskon(){

    var total = parseFloat(document.getElementById("totalBelanja").value);

    var pesan = "";

    if(isNaN(total)){

        pesan = "Mohon masukkan angka yang valid!";

    }

    else if(total >= 250000){

        var diskon = total * 0.15;

        var totalBayar = total - diskon;

        pesan =
        "🎉 Selamat! Anda mendapatkan diskon 15% <br><br>" +
        "Total Belanja : Rp " + total.toLocaleString() + "<br>" +
        "Diskon : Rp " + diskon.toLocaleString() + "<br>" +
        "<b>Total Bayar : Rp " + totalBayar.toLocaleString() + "</b>";

    }

    else if(total >= 100000){

        var diskon = total * 0.10;

        var totalBayar = total - diskon;

        pesan =
        "🎉 Selamat! Anda mendapatkan diskon 10% <br><br>" +
        "Total Belanja : Rp " + total.toLocaleString() + "<br>" +
        "Diskon : Rp " + diskon.toLocaleString() + "<br>" +
        "<b>Total Bayar : Rp " + totalBayar.toLocaleString() + "</b>";

    }

    else{

        pesan =
        "Maaf, Anda tidak mendapatkan diskon.<br><br>" +
        "<b>Total Bayar : Rp " + total.toLocaleString() + "</b>";

    }

    document.getElementById("hasil").innerHTML = pesan;

}

</script>

</body>
</html>
