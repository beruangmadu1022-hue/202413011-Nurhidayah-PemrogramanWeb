<!DOCTYPE html>
<html lang="en">
<head>

    <title>Latihan Event Handling</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        img{
            border:3px solid #333;
            border-radius:10px;
        }

        #inputNama{
            padding:8px;
            border:2px solid #ccc;
            border-radius:5px;
            transition:0.3s;
        }

        #inputNama:focus{
            border-color:dodgerblue;
            outline:none;
        }

        #hasil{
            color:blue;
            font-weight:bold;
        }

    </style>

</head>

<body>

<h2>Latihan Event Handling</h2>

<h3>Event Mouse Over dan Mouse Out</h3>

<img
id="gambar"
src="https://placehold.co/250x170/e8e8e8/000?text=Gambar+Awal"
alt="gambar"
onmouseover="gantiGambar()"
onmouseout="kembalikanGambar()">

<br><br>

<h3>Event Onchange</h3>

<label>Masukkan Nama :</label><br><br>

<input
type="text"
id="inputNama"
placeholder="Ketik nama..."
onchange="tampilkanOutput()">

<p>Output : <span id="hasil"></span></p>

<script>

function gantiGambar(){

    document.getElementById("gambar").src =
    "gambar 1.jpeg";

}

function kembalikanGambar(){

    document.getElementById("gambar").src =
    "gambar 2.jpeg";

}

function tampilkanOutput(){

    var nama = document.getElementById("inputNama").value;

    document.getElementById("hasil").innerHTML =
    "Halo, <b>" + nama + "</b>. Selamat belajar JavaScript!";

}

</script>

</body>
</html>
