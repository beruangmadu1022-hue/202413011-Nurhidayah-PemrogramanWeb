<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Latihan Slideshow</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            margin-top:40px;
        }

        h2{
            color:darkblue;
        }

        img{
            width:500px;
            height:300px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

        button{
            margin:20px 10px;
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<h2>Image Slideshow</h2>

<img id="slideshow-image" src="" alt="Slideshow">

<br>

<button onclick="gantiGambar(-1)">Previous</button>

<button onclick="gantiGambar(1)">Next</button>

<script>

var gambar = [

"welcome.jpeg",
"rapat.jpeg",
"hamster 1.jpeg",
"AAAA.jpeg"

];

var indexGambar = 0;

var imageElement = document.getElementById("slideshow-image");

function tampilkanGambar(){

    imageElement.src = gambar[indexGambar];

}

function gantiGambar(arah){

    indexGambar += arah;

    if(indexGambar >= gambar.length){

        indexGambar = 0;

    }

    if(indexGambar < 0){

        indexGambar = gambar.length - 1;

    }

    tampilkanGambar();

}

tampilkanGambar();

</script>

</body>
</html>
