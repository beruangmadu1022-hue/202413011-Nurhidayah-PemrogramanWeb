<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Latihan To-Do List</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        h2{
            color:darkblue;
        }

        input{
            padding:8px;
            width:250px;
        }

        button{
            padding:8px 12px;
            cursor:pointer;
            margin-left:5px;
        }

        ul{
            list-style:none;
            padding:0;
            margin-top:20px;
        }

        li{
            background:white;
            padding:10px;
            margin-bottom:10px;
            border-radius:5px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }

        .hapus{
            background:red;
            color:white;
            border:none;
            padding:5px 10px;
            border-radius:5px;
        }

    </style>

</head>

<body>

<h2>Aplikasi To-Do List</h2>

<input
type="text"
id="input-todo"
placeholder="Masukkan tugas...">

<button onclick="tambahTugas()">Tambah</button>

<ul id="daftar-tugas"></ul>

<script>

var tugas = [];

function tambahTugas(){

    var inputElement = document.getElementById("input-todo");

    if(inputElement.value == ""){

        alert("Masukkan tugas terlebih dahulu!");

        return;

    }

    tugas.push(inputElement.value);

    inputElement.value = "";

    tampilkanDaftar();

}

function tampilkanDaftar(){

    var daftarElement = document.getElementById("daftar-tugas");

    daftarElement.innerHTML = "";

    for(let i=0; i<tugas.length; i++){

        daftarElement.innerHTML +=

        "<li>" +

        tugas[i] +

        "<button class='hapus' onclick='hapusTugas(" + i + ")'>Hapus</button>" +

        "</li>";

    }

}

function hapusTugas(index){

    tugas.splice(index,1);

    tampilkanDaftar();

}

</script>

</body>
</html>
