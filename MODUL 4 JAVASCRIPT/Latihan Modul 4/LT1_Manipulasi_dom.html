<!DOCTYPE html>
<html lang="en">
<head>
    <title>Latihan Manipulasi DOM</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #judul{
            color: steelblue;
        }

        button{
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: steelblue;
            color: white;
            border-radius: 5px;
        }

        button:hover{
            background-color: royalblue;
        }

    </style>

</head>

<body>

<h1 id="judul">Selamat Datang di Praktikum JavaScript</h1>

<button onclick="ubahTeks()">Ubah Teks Judul</button>

<script>

function ubahTeks(){

    var elemenJudul = document.getElementById("judul");

    elemenJudul.innerHTML = "Belajar JavaScript Itu Mudah dan Menyenangkan!";

    elemenJudul.style.color = "crimson";

    elemenJudul.style.fontSize = "36px";

    elemenJudul.style.fontWeight = "bold";

}

</script>

</body>
</html>
