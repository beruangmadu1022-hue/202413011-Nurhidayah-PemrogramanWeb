<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Toko Elektronik Cepat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
        }

        header {
            background: #984f7d;
            color: white;
            padding: 15px;
            text-align: center;
        }

        header h2 {
            font-size: 28px;
        }

        #jam {
            font-size: 15px;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
        }

        .card {
            border-radius: 12px;
        }

        #gambarProduk {

            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #ffffff;

        }

        .card-produk {

            cursor: pointer;
            transition: .3s;

        }

        .card-produk:hover {

            transform: scale(1.02);

        }

        .card-body {

            padding: 12px;

        }

        .card-body h3 {

            font-size: 24px;

        }

        .card-body h4 {

            font-size: 22px;

        }

        .card-body h5 {

            font-size: 17px;

        }

        .form-control {

            font-size: 14px;

        }

        .btn {

            font-size: 14px;

        }

        .output {

            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;

        }

        .output h3 {

            font-size: 22px;

        }

        .output h4 {

            font-size: 20px;

        }
    </style>

</head>

<body>

    <header>

        <h2>Toko Elektronik Cepat</h2>

        <div id="jam"></div>

    </header>

    <div class="container mt-3">
        <div class="row">

            <!-- Produk Utama -->
            <div class="col-md-8">

                <div class="card shadow-sm">

                    <img id="gambarProduk" src="" alt="Produk">

                    <div class="card-body text-center">

                        <h3 id="namaProduk"></h3>

                        <h4 class="text-danger fw-bold" id="hargaProduk"></h4>

                        <div class="mt-3">

                            <button class="btn btn-primary btn-sm" onclick="gantiSlide(-1)">
                                ⬅ Previous
                            </button>

                            <button class="btn btn-success btn-sm" onclick="gantiSlide(1)">
                                Next ➡
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Daftar Produk -->
            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-header bg-dark text-white">

                        Daftar Produk

                    </div>

                    <div class="card-body">

                        <div id="listProduk"></div>

                    </div>

                </div>

            </div>

        </div>

        <hr>

        <h3 class="mb-3">
            Form Pemesanan
        </h3>

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="row">

                    <div class="col-md-4">

                        <label class="form-label">

                            Nama Pemesan

                        </label>

                        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama">

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            Jumlah Pesanan

                        </label>

                        <input type="number" id="jumlah" class="form-control" placeholder="Jumlah">

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            Kode Promo

                        </label>

                        <input type="text" id="promo" class="form-control" placeholder="DISKON10">

                    </div>

                </div>

                <div class="mt-4 text-center">

                    <button class="btn btn-warning btn-sm px-4" onclick="pesanProduk()">

                        🛒 Pesan Sekarang

                    </button>

                </div>

                <div id="output" class="output mt-4">

                    <h5 class="text-center text-secondary">

                        Struk pemesanan akan muncul di sini.

                    </h5>

                </div>

            </div>

        </div>

        <script>

            var produk = [

                {

                    nama: "Laptop Axioo",

                    harga: 9000000,

                    gambar: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLCrNosiHQj-akkd3kfGr3nGNghzxXF24iYTqd86CktVcUxXW3DnSg0bw8&s=10"

                },

                {

                    nama: "Iphone 16 Pro Max",

                    harga: 19499000,

                    gambar: "https://www.digimap.co.id/cdn/shop/files/0788-APPMYEA3ID-A-1.jpg?v=1734067560"

                },

                {

                    nama: "Headset Gaming",

                    harga: 650000,

                    gambar: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRT6w1j3oHWt1vIUF_xwilopWIhBOgHS1CgmOOqXM7AH7ugJNBDEmzgYj3D&s=10"

                }

            ];

            var index = 0;
            function tampilProduk() {

                document.getElementById("gambarProduk").src = produk[index].gambar;

                document.getElementById("namaProduk").innerHTML = produk[index].nama;

                document.getElementById("hargaProduk").innerHTML =
                    "Rp " + produk[index].harga.toLocaleString("id-ID");

            }

            function gantiSlide(arah) {

                index += arah;

                if (index >= produk.length) {
                    index = 0;
                }

                if (index < 0) {
                    index = produk.length - 1;
                }

                tampilProduk();

            }

            function pilihProduk(i) {

                index = i;

                tampilProduk();

            }

            function tampilDaftar() {

                let html = "";

                for (let i = 0; i < produk.length; i++) {

                    html += `
        <div class="card mb-2 card-produk"
        onclick="pilihProduk(${i})">

            <div class="card-body">

                <h6>${produk[i].nama}</h6>

                <span class="text-danger fw-bold">
                Rp ${produk[i].harga.toLocaleString("id-ID")}
                </span>

            </div>

        </div>
        `;

                }

                document.getElementById("listProduk").innerHTML = html;

            }

            function updateJam() {

                let sekarang = new Date();

                let hari = [
                    "Minggu", "Senin", "Selasa", "Rabu",
                    "Kamis", "Jumat", "Sabtu"
                ];

                let bulan = [
                    "Januari", "Februari", "Maret", "April",
                    "Mei", "Juni", "Juli", "Agustus",
                    "September", "Oktober", "November", "Desember"
                ];

                let teks =

                    hari[sekarang.getDay()] +

                    ", " +

                    sekarang.getDate() +

                    " " +

                    bulan[sekarang.getMonth()] +

                    " " +

                    sekarang.getFullYear() +

                    " | " +

                    sekarang.toLocaleTimeString("id-ID");

                document.getElementById("jam").innerHTML = teks;

            }

            setInterval(updateJam, 1000);

            updateJam();

            tampilProduk();

            tampilDaftar();
            function pesanProduk() {

                var nama = document.getElementById("nama").value.trim();

                var jumlah = parseInt(document.getElementById("jumlah").value);

                var promo = document.getElementById("promo").value.toUpperCase().trim();

                // Validasi Nama
                if (nama == "") {

                    alert("Nama pemesan tidak boleh kosong!");

                    document.getElementById("nama").focus();

                    return;

                }

                // Validasi Jumlah
                if (isNaN(jumlah) || jumlah <= 0) {

                    alert("Jumlah pesanan harus lebih dari 0!");

                    document.getElementById("jumlah").focus();

                    return;

                }

                // Perhitungan
                var harga = produk[index].harga;

                var subtotal = harga * jumlah;

                var diskon = 0;

                if (promo == "DISKON10") {

                    diskon = subtotal * 0.10;

                }

                var total = subtotal - diskon;

                // Order ID Random
                var orderID =

                    "INV-" +

                    Math.floor(Math.random() * 90000 + 10000);

                // Tanggal
                var tanggal = new Date();

                document.getElementById("output").innerHTML =

                    "<h4 class='text-center text-primary'>STRUK PEMBELIAN</h4>" +

                    "<hr>" +

                    "<table class='table table-bordered'>" +

                    "<tr>" +

                    "<th>Order ID</th>" +

                    "<td>" + orderID + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Tanggal</th>" +

                    "<td>" + tanggal.toLocaleString("id-ID") + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Nama Pemesan</th>" +

                    "<td>" + nama + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Produk</th>" +

                    "<td>" + produk[index].nama + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Harga</th>" +

                    "<td>Rp " + harga.toLocaleString("id-ID") + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Jumlah</th>" +

                    "<td>" + jumlah + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Subtotal</th>" +

                    "<td>Rp " + subtotal.toLocaleString("id-ID") + "</td>" +

                    "</tr>" +

                    "<tr>" +

                    "<th>Diskon</th>" +

                    "<td>Rp " + diskon.toLocaleString("id-ID") + "</td>" +

                    "</tr>" +

                    "<tr class='table-success'>" +

                    "<th>Total Bayar</th>" +

                    "<th>Rp " + total.toLocaleString("id-ID") + "</th>" +

                    "</tr>" +

                    "</table>" +

                    "<div class='alert alert-success text-center mt-3'>" +

                    "Terima kasih telah berbelanja di <b>Toko Elektronik Cepat</b> 😊" +

                    "</div>";

            }

        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
