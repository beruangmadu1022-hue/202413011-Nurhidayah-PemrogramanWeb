<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Mahasiswa Baru</title>
</head>

<body style="background-color:#f2f2f2; margin:30px; font-family:Arial, sans-serif;">

    <!-- Judul Halaman -->
    <h1 style="text-align:center;">Formulir Pendaftaran Mahasiswa Baru</h1>

    <!-- Logo Kampus -->
    <div style="text-align:center;">
        <img src="logo stitek.jpg" alt="Logo Kampus" width="150">
    </div>

    <br>

    <!-- Formulir Pendaftaran -->
    <form action="#" method="post">

        <!-- Data Pribadi -->
        <fieldset>
            <legend><b>Data Pribadi</b></legend>

            <label for="nama">Nama Lengkap :</label><br>
            <input type="text"
                   id="nama"
                   name="nama"
                   placeholder="Masukkan nama lengkap"
                   required>
            <br><br>

            <label for="email">Email :</label><br>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="contoh@gmail.com"
                   required>
            <br><br>

            <label>Jenis Kelamin :</label><br>

            <input type="radio"
                   id="pria"
                   name="gender"
                   value="Pria"
                   required>
            <label for="pria">Pria</label>

            <input type="radio"
                   id="wanita"
                   name="gender"
                   value="Wanita">
            <label for="wanita">Wanita</label>

        </fieldset>

        <br>

        <!-- Hobi -->
        <fieldset>
            <legend><b>Hobi</b></legend>

            <input type="checkbox" id="membaca" name="hobi" value="Membaca">
            <label for="membaca">Membaca</label><br>

            <input type="checkbox" id="olahraga" name="hobi" value="Olahraga">
            <label for="olahraga">Olahraga</label><br>

            <input type="checkbox" id="musik" name="hobi" value="Musik">
            <label for="musik">Musik</label><br>

            <input type="checkbox" id="game" name="hobi" value="Game">
            <label for="game">Game</label>

        </fieldset>

        <br>

        <!-- Jurusan -->
        <fieldset>
            <legend><b>Pilihan Jurusan</b></legend>

            <label for="jurusan">Jurusan :</label><br>

            <select id="jurusan" name="jurusan">
                <option value="">-- Pilih Jurusan --</option>
                <option value="Sistem Informasi">Sistem Informasi</option>
                <option value="Teknik Informatika">Teknik Informatika</option>
                <option value="Keperawatan">Manajemen</option>
            </select>

        </fieldset>

        <br>

        <!-- Alamat -->
        <fieldset>
            <legend><b>Alamat Lengkap</b></legend>

            <textarea id="alamat"
                      name="alamat"
                      rows="5"
                      cols="40"
                      placeholder="Masukkan alamat lengkap"></textarea>

        </fieldset>

        <br>

        <!-- Tombol Submit -->
        <input type="submit" value="Daftar">

    </form>

    <br><hr>

    <!-- Link Informasi Kampus -->
    <p>
        Informasi lebih lanjut kunjungi:
        <a href="https://www.stitek.ac.id" target="_blank">
            Website Resmi STITEK
        </a>
    </p>

</body>
</html>
