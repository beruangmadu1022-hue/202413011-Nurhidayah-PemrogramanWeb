<!--Daftar (List)-->
<!DOCTYPE html>
<html>
<head>
    <title>Daftar HTML</title>
</head>
<body>

    <h2>Daftar Berurutan</h2>
    <ol>
        <li>Bangun tidur</li>
        <li>Merapikan tempat tidur</li>
        <li>Mandi pagi</li>
    </ol>

    <h2>Daftar Tidak Berurutan</h2>
    <ul>
        <li>Atas</li>
        <li>Tengah</li>
        <li>Bawah</li>
    </ul>

    <h2>Daftar Definisi</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Bahasa markup untuk membuat halaman web.</dd>

        <dt>CSS</dt>
        <dd>Bahasa untuk mengatur tampilan halaman web.</dd>
    </dl>

</body>
</html>
