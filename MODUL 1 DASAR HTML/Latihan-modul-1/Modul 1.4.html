<!--Format Teks-->
<!DOCTYPE html>
<html>
<head>
    <title>Latihan Format Teks</title>
</head>
<body>

    <p>
        Saya sedang belajar <br>
        <b>HTML</b>, <br>
        <i>CSS</i>, dan <br>
        <u>JavaScript</u>. <br>
    </p>

    <p>
        <strong>Penting!</strong> <br>
        Praktikum ini harus dikerjakan dengan teliti.<br>
    </p>

    <p>
        <em>Jangan lupa</em><br>
        untuk menyimpan file sebelum menjalankan program.<br>
    </p>

</body>
</html>
